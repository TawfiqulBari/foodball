# Supabase CLI config for the SELF-HOSTED stack on this server.
# `supabase start` reads this; `supabase db reset` applies migrations/ + seed.sql.
# Secrets are referenced with env(...) so they never live in this committed file.
# (Some keys vary by CLI version — verify against `supabase --version` at go-live.)
project_id = "foodball"

[api]
enabled = true
port = 54321                 # Kong gateway — the host nginx proxies /auth/v1 etc. here
schemas = ["public"]
extra_search_path = ["public"]

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
# Set both to your real public origin at go-live (single origin via nginx).
site_url = "https://foodball.tawfiqulbari.work"
additional_redirect_urls = ["https://foodball.tawfiqulbari.work"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
# Email + password with NO confirmation loop → colleagues are in immediately,
# no SMTP dependency for sign-up (spec deviation chosen for the office launch).
enable_confirmations = false
double_confirm_changes = false

[auth.email.smtp]
# Gmail/Workspace SMTP — used for password resets etc. (not required for signup).
# Disabled for now: confirmations are off, so sign-up/login work without it. Flip
# to true + set GOTRUE_SMTP_PASS (from secrets/) when you want password-reset email.
enabled = false
host = "smtp.gmail.com"
port = 587
user = "admin@tawfiqulbari.work"
pass = "env(GOTRUE_SMTP_PASS)"
admin_email = "admin@tawfiqulbari.work"
sender_name = "FoodBall"

[functions.sync-fixtures]
verify_jwt = true                  # never anonymous; the function also self-checks admin

[functions.sync-results]
verify_jwt = false                 # called by pg_cron with the x-sync-secret header (self-checks)
