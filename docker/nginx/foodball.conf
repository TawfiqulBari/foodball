# FoodBall in-container nginx (unprivileged, port 8080). Serves the static SPA
# and sets defense-in-depth response headers. TLS is terminated by the upstream
# reverse proxy / platform (see docker/nginx/foodball-tls.conf.example).
#
# NOTE: every add_header lives at SERVER scope. nginx drops inherited add_headers
# the moment a `location` declares its own — so locations below add none, keeping
# the security headers on every response (including the SPA HTML and assets).

limit_req_zone $binary_remote_addr zone=spa:10m rate=20r/s;

map $sent_http_content_type $cache_control {
  default                 "no-cache";
  ~application/javascript "public, max-age=31536000, immutable";
  ~text/css               "public, max-age=31536000, immutable";
  ~image/                 "public, max-age=604800";
  ~font/                  "public, max-age=31536000, immutable";
}

server {
  listen 8080;
  server_name _;
  server_tokens off;                       # CIS / OWASP: don't leak the version

  root /usr/share/nginx/html;
  index index.html;

  client_max_body_size 1m;                 # a static SPA needs almost nothing

  # ── Security headers (server scope → apply to every response) ──────────────
  add_header X-Frame-Options              "DENY" always;
  add_header X-Content-Type-Options       "nosniff" always;
  add_header Referrer-Policy              "strict-origin-when-cross-origin" always;
  add_header Cross-Origin-Opener-Policy   "same-origin" always;
  add_header Cross-Origin-Resource-Policy "same-origin" always;
  add_header Permissions-Policy
    "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;
  # HSTS is set by the TLS-terminating proxy (only meaningful over HTTPS).
  add_header Content-Security-Policy
    "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; img-src 'self' data: blob:; font-src 'self' https://fonts.gstatic.com data:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self'; connect-src 'self' https://*.supabase.co wss://*.supabase.co http://127.0.0.1:54321 ws://127.0.0.1:54321 http://localhost:54321 ws://localhost:54321" always;
  add_header Cache-Control $cache_control always;

  # Health endpoint for Docker/orchestrator probes.
  location = /healthz {
    access_log off;
    default_type text/plain;
    return 200 "ok\n";
  }

  # Never serve dotfiles (.env, .git, etc.).
  location ~ /\. { deny all; return 404; }

  # SPA: serve hashed assets, fall back to index.html for client routes.
  location / {
    limit_req zone=spa burst=40 nodelay;
    try_files $uri $uri/ /index.html;
  }
}
